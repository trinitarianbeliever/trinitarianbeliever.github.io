<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinitarian Believer</title>
    <!-- Tailwind CSS CDN for easy styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./Img/favicon.ico"> 
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
</head>
<body class="bg-white min-h-screen">

    <!-- Header Section -->
    <header class="bg-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-4">
            <!-- Logo/Site Name -->
            <div class="flex-shrink-0">
                <a href="#" class="text-2xl font-bold text-[#6f777d] hover:text-[#4a5054] rounded-md p-2 transition-colors duration-300">Trinitarian Believer</a>
            </div>

            <!-- Navigation Menu & Search Bar -->
            <div class="flex-grow flex items-center justify-end space-x-6">
                <!-- Desktop Navigation Menu -->
                <nav class="hidden md:flex space-x-6 items-center">
                    <a href="#" id="home-link" class="link-underline text-[#6f777d] hover:text-[#4a5054] text-[22px] font-medium transition-colors duration-300 rounded-md p-3">Home</a>
                    <a href="#" id="categories-link" class="link-underline text-[#6f777d] hover:text-[#4a5054] text-[22px] font-medium transition-colors duration-300 rounded-md p-3">Categories</a>
                    <a href="#" id="about-link" class="link-underline text-[#6f777d] hover:text-[#4a5054] text-[22px] font-medium transition-colors duration-300 rounded-md p-3">About</a>
                </nav>

                <!-- Search Input -->
                <div class="relative flex-grow max-w-sm">
                    <input type="text" id="search-input" placeholder="Search articles..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </div>
            </div>
            
            <!-- Mobile Menu Toggle Button -->
            <button id="menu-toggle" class="md:hidden text-gray-600 hover:text-gray-900 p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>

        <!-- Mobile Navigation Menu - Initially Hidden -->
        <nav id="mobile-menu" class="hidden md:hidden mt-4 bg-gray-50 rounded-lg shadow-inner">
            <a href="#" id="home-link-mobile" class="link-underline block p-4 text-gray-700 text-[22px] transition-colors duration-300 rounded-lg font-medium">Home</a>
            <a href="#" id="categories-link-mobile" class="link-underline block p-4 text-gray-700 text-[22px] transition-colors duration-300 rounded-lg font-medium">Categories</a>
            <a href="#" id="about-link-mobile" class="link-underline block p-4 text-gray-700 text-[22px] transition-colors duration-300 rounded-lg font-medium">About</a>
        </nav>
    </header>

    <div class="border-b-2 border-[rgba(111,119,125,0.15)]"></div>

    <main class="container mx-auto p-8">
        <!-- Main Content Area (3/4 width) -->
        <div class="w-full">
            <!-- Main content area, showing either categories, posts, or a single post -->
            <div id="content-area">
                <!-- Categories Section (initially hidden) -->
                <div id="categories-view" class="hidden">
                    <div id="categories-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                        <!-- Category buttons will be dynamically added here by JavaScript -->
                    </div>
                    <!-- Category Pagination Controls -->
                    <div id="category-pagination-controls" class="flex justify-center items-center gap-2 mt-8">
                        <!-- Pagination buttons will be dynamically added here -->
                    </div>
                </div>

                <!-- About Section (initially hidden) -->
                <div id="about-view" class="hidden">
                    <blockquote class="border-l-4 border-gray-400 pl-4 py-2 italic max-w-2xl">
                        <p class="text-[#6f777d] leading-relaxed text-xl mb-2 font-bold">
                            "But he was wounded for our transgressions, he was bruised for our iniquities: the chastisement of our peace was upon him; and with his stripes we are healed."
                        </p>
                    </blockquote>
                </div>
                
                <!-- Blog Posts Section (initially shown) -->
                <div id="posts-view">
                    <div class="flex items-center justify-end mb-6">
                        <button id="show-all-btn" class="hidden px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-full hover:bg-gray-300 transition-colors duration-300">Show All Posts</button>
                    </div>
                    <div id="posts-container" class="grid grid-cols-1 gap-6">
                        <!-- Posts will be dynamically added here by JavaScript -->
                    </div>
                    
                    <!-- Pagination Controls -->
                    <div id="pagination-controls" class="flex justify-center items-center gap-2 mt-8">
                        <!-- Pagination buttons will be dynamically added here -->
                    </div>
                </div>
                
                <!-- Single Post Section (initially hidden) -->
                <div id="post-detail-view" class="hidden">
                    <button id="back-to-posts-btn" class="mb-4 px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-full hover:bg-gray-300 transition-colors duration-300">
                        &larr; Back to Articles
                    </button>
                    <div class="bg-white p-8 rounded-lg">
                        <h1 id="post-detail-title" class="text-3xl font-bold text-gray-800 mb-4"></h1>
                        <p id="post-detail-date" class="text-lg text-gray-500 mb-4"></p>
                        <p id="post-detail-content" class="text-xl text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="bg-white py-8 border-t-2 border-[rgba(111,119,125,0.15)]">
        <div class="container mx-auto px-8 flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0">
            <!-- Copyright Text -->
            <div class="text-[#6f777d] text-lg text-center md:text-left">
                &copy; 2024 Trinitarian Believer. All Rights Reserved.
            </div>
        </div>
    </footer>
    
    <!-- JavaScript for Mobile Menu, Search Filter, and Pagination -->
    <script src="./script.js"></script>
</body>
</html>

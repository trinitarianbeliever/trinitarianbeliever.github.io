<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinitarian Believer</title>
    <!-- Native Lazy Loading is applied to all dynamically created images in the JS -->
    <!-- Fonts: Kalam for the main title, Raleway for everything else -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Raleway:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
    <link rel="icon" type="image/x-icon" href="./img/favicon.jpg">
</head>
<body>

    <header>
        <div class="container header-content">
            <!-- Home Link (STEP 1.1) -->
            <a href="#" class="site-name" data-route="home">Trinitarian Believer</a>

            <!-- Hamburger Icon (STEP 1.1) -->
            <div class="hamburger-icon" id="hamburger">
                <div></div>
                <div></div>
                <div></div>
            </div>

            <!-- Navigation Menu (STEP 1.1) -->
            <ul class="nav-menu" id="nav-menu">
                <!-- Mobile Search Placeholder (The JS moves the search box into this LI when menu opens) -->
                <li id="mobile-search-placeholder"></li>
                <li><a href="#" data-route="archives">Archives</a></li>
                <li><a href="#" data-route="categories">Categories</a></li>
                <li><a href="#" data-route="books">Books</a></li>
                <li><a href="#" data-route="about">About</a></li>
            </ul>

            <!-- Search Box (ID added for dynamic relocation) -->
            <div class="search-container" id="search-container-desktop">
                <input type="text" id="search-input" placeholder="Search articles..." aria-label="Search articles by title">
                <button id="search-button">
                    <!-- Search Icon (SVG) -->
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19.5l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Dynamic content will be injected here -->
        <div id="content-area">
            <!-- Initial content will be the home page (blog cards) -->
        </div>
    </main>

    <footer>
        <div class="container">
            <!-- Social Media Links (STEP 1.3) -->
            <div class="social-links">
                <a href="https://www.youtube.com/@trinitarianbeliever" target="_blank">
                    <!-- YouTube Icon (SVG) -->
                    <svg viewBox="0 0 24 24"><path d="M10 15l5.5-3-5.5-3v6zm11.972-1.92A2.99 2.99 0 0 0 20.32 9.07C19.78 8.44 16.54 8 12 8s-7.78.44-8.35.95a2.986 2.986 0 0 0-1.652 3.03l.032.22c.56 3.1 3.51 4.5 7.97 4.5s7.41-1.4 7.97-4.5l.032-.22z"/></svg>
                    Youtube
                </a>
                <a href="https://trinitarianbeliever.github.io/" target="_blank">
                    <!-- GitHub Icon (SVG) -->
                    <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.087-.744.084-.69.084-.69 1.205.084 1.839 1.237 1.839 1.237 1.07 1.837 2.809 1.305 3.493.998.108-.776.417-1.305.762-1.605-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.465-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.046.138 3.003.404 2.293-1.552 3.301-1.23 3.301-1.23.652 1.652.241 2.873.117 3.176.771.84 1.236 1.911 1.236 3.221 0 4.609-2.807 5.624-5.479 5.922.429.369.814 1.096.814 2.202v3.293c0 .319.192.694.801.576C20.566 21.782 24 17.28 24 12c0-6.627-5.373-12-12-12z"/></svg>
                    Github
                </a>
                <a href="https://trinitarianbeliever.github.io/" target="_blank">
                    <!-- Website Icon (SVG - Home) -->
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    Website
                </a>
            </div>

            <!-- Divider Line (STEP 1.3) -->
            <div class="footer-divider"></div>

            <!-- Copyright (STEP 1.3) -->
            <p class="footer-copyright">
                &copy; 2025 Trinitarian Believer. All rights reserved.
            </p>

            <!-- Article Count (STEP 1.3) -->
            <p class="footer-article-count" id="article-count-footer">
                Currently hosting 0 articles.
            </p>
        </div>
    </footer>
    
    <!-- Custom Message Box for safe alerts/confirms -->
    <div id="message-box">
        <p id="message-text"></p>
        <button id="message-ok-button">OK</button>
    </div>

    <script src="./src/script.js"></script> 

</body>
</html>

            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            color: #2C3E50;
            line-height: 1.6;

            flex-direction: column;
            min-height: 100vh;
        }

            max-width: 1200px;

        }

            background-color: #353333;

            font-weight: 700;
            font-size: 30px;
            margin: 0;
        }

        /* Menu button styling for mobile */
        .menu-toggle {
            display: none;
            background: none;
            border: 1px solid #ECF0F1;

            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        /* Container for nav links and search box */
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transition: max-height 0.3s ease-out;
        }

        .header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1.5rem;
            justify-content: flex-end;
        }

        .header nav ul li a {
            color: #ECF0F1;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.3s ease;
            position: relative;
        }

        .header nav ul li a:hover {
            color: #ECF0F1;
        }
        
        /* Underline animation */
        .header nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: #ECF0F1;
            transition: width 0.3s ease, left 0.3s ease;

                align-items: center;
            }

            .search-box input {
                width: 100%;
            }
        }

        // Function to fetch blog posts from a JSON file
        async function fetchBlogPosts() {
            try {
                const response = await fetch('./handle/posts.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                blogPosts = await response.json();
                // After fetching, render the initial page
                renderHomePage();
            } catch (error) {
                console.error('Could not fetch blog posts:', error);
                document.getElementById('main-content').textContent = 'Failed to load blog posts. Please try again later.';
            }
        }
        
        // Asynchronously fetches content from a separate HTML file.
        async function fetchPostContent(filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const content = await response.text();
                // Use DOMParser to safely parse the HTML and extract the body content
                const parser = new DOMParser();
                const doc = parser.parseFromString(content, 'text/html');
                const bodyContent = doc.body.innerHTML;
                return bodyContent;
            } catch (error) {
                console.error('Could not fetch post content:', error);
                return `<p>Failed to load post content. Please try again later.</p>`;
            }
        }

        // === Utility Functions for Rendering ===

        // Creates a blog post element for the blog index view.
        function createBlogCardElement(post) {
            const article = document.createElement('article');
            article.classList.add('blog-post');
            article.dataset.id = post.id;
            
            const title = document.createElement('h3');
            title.textContent = post.title;

            const date = document.createElement('p');
            date.classList.add('blog-date');
            date.textContent = `Published on: ${post.date}`;

            const topics = document.createElement('div');
            topics.textContent = `Topics: ${post.topics.join(', ')}`;

            article.appendChild(title);
            article.appendChild(date);
            article.appendChild(topics);

            return article;
        }

        // Creates a full blog post element.
        async function createFullPostElement(post) {
            const article = document.createElement('article');
            article.classList.add('blog-post', 'full-post');
            
            const title = document.createElement('h2');
            title.textContent = post.title;

            const date = document.createElement('p');
            date.classList.add('blog-date');
            date.textContent = `Published on: ${post.date}`;
            
            const content = document.createElement('div');
            // Check if filePath exists, if so, fetch and inject content
            if (post.filePath) {
                const fetchedContent = await fetchPostContent(post.filePath);
                content.innerHTML = fetchedContent; // Use innerHTML to render HTML content
            } else {
                content.innerHTML = `<p>${post.content}</p>`;
            }

            article.appendChild(title);
            article.appendChild(date);
            article.appendChild(content);

            return article;
        }

        // === Page Rendering Functions ===
        
        // UPDATED: Renders the Books page with pagination logic.
        function renderBooksPage(pageNumber = 1) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            
            const booksPerPage = 20; // Limit to 20 books per page
            const totalBooks = bookList.length;
            const totalPages = Math.ceil(totalBooks / booksPerPage);
            
            // Calculate indices for the current page
            const startIndex = (pageNumber - 1) * booksPerPage;
            const endIndex = startIndex + booksPerPage;
            const booksToDisplay = bookList.slice(startIndex, endIndex); // Slice the array
            
            const heading = document.createElement('h2');
            heading.textContent = 'Our Published Works';
            mainContent.appendChild(heading);

            const booksGrid = document.createElement('div');
            booksGrid.classList.add('books-grid');

            if (booksToDisplay.length > 0) {
                booksToDisplay.forEach(book => {
                    const card = document.createElement('div');
                    card.classList.add('book-card');

                    const cover = document.createElement('img');
                    cover.src = book.coverUrl;
                    cover.alt = `Book ${book.id} Cover`;
                    cover.onerror = function() {
                        this.onerror=null; 
                        this.src='https://placehold.co/200x300/CCCCCC/353333?text=Cover+Not+Found';
                    };
                    
                    const link = document.createElement('a');
                    link.href = book.link;
                    link.textContent = 'DOWNLOAD PDF';
                    link.setAttribute('target', '_blank'); // Open in new tab
                    
                    card.appendChild(cover);
                    card.appendChild(link);
                    
                    booksGrid.appendChild(card);
                });
                mainContent.appendChild(booksGrid);

                // --- Pagination UI for Books ---
                const pagination = document.createElement('div');
                pagination.classList.add('pagination');
                
                const prevButton = document.createElement('button');
                prevButton.textContent = 'Previous';
                prevButton.disabled = pageNumber === 1;
                // Re-render the page by decreasing the page number
                prevButton.addEventListener('click', () => renderBooksPage(pageNumber - 1));

                const pageInfo = document.createElement('span');
                pageInfo.textContent = `Page ${pageNumber} of ${totalPages} (${totalBooks} total)`;

                const nextButton = document.createElement('button');
                nextButton.textContent = 'Next';
                // Disable if the end index is greater than or equal to the total books
                nextButton.disabled = endIndex >= totalBooks;
                // Re-render the page by increasing the page number
                nextButton.addEventListener('click', () => renderBooksPage(pageNumber + 1));
                
                pagination.appendChild(prevButton);
                pagination.appendChild(pageInfo);
                pagination.appendChild(nextButton);
                
                mainContent.appendChild(pagination);

            } else {
                mainContent.innerHTML += '<p>No books currently available on this page.</p>';
            }
        }


        // Renders the Home page with the latest blog post.
        async function renderHomePage() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = ''; 
            
            if (blogPosts.length > 0) {
                const sortedPosts = [...blogPosts].sort((a, b) => new Date(b.date) - new Date(a.date));
                const latestPost = sortedPosts[0];

                const postElement = await createFullPostElement(latestPost);
                
                const contentWrapper = document.createElement('div');
                contentWrapper.classList.add('content-section');
                contentWrapper.appendChild(postElement);

                mainContent.appendChild(contentWrapper);
            } else {
                mainContent.textContent = 'No blog posts available.';
            }
        }

        // Renders the Blog page with pagination.
        function renderBlogPage(pageNumber = 1) {
            const postsPerPage = 9;
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            
            const sortedPosts = [...blogPosts].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const startIndex = (pageNumber - 1) * postsPerPage;
            const endIndex = startIndex + postsPerPage;
            const postsToDisplay = sortedPosts.slice(startIndex, endIndex);

            const heading = document.createElement('h2');
            heading.textContent = 'All Blog Posts';

            const blogGrid = document.createElement('div');
            blogGrid.classList.add('blog-grid');

            postsToDisplay.forEach(post => {
                const postElement = createBlogCardElement(post);
                blogGrid.appendChild(postElement);
            });

            const pagination = document.createElement('div');
            pagination.classList.add('pagination');
            
            const prevButton = document.createElement('button');
            prevButton.textContent = 'Previous';
            prevButton.disabled = pageNumber === 1;
            prevButton.addEventListener('click', () => renderBlogPage(pageNumber - 1));

            const nextButton = document.createElement('button');
            nextButton.textContent = 'Next';
            nextButton.disabled = endIndex >= blogPosts.length;
            nextButton.addEventListener('click', () => renderBlogPage(pageNumber + 1));
            
            const pageInfo = document.createElement('span');
            pageInfo.textContent = `Page ${pageNumber}`;

            pagination.appendChild(prevButton);
            pagination.appendChild(pageInfo);
            pagination.appendChild(nextButton);

            mainContent.appendChild(heading);
            mainContent.appendChild(blogGrid);
            mainContent.appendChild(pagination);
        }

        // Renders a list of blog posts filtered by a specific topic.
        function renderTopicPosts(topic) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            const filteredPosts = blogPosts.filter(post => post.topics.includes(topic));
            
            const heading = document.createElement('h2');
            heading.textContent = `Posts on "${topic}"`;

            const blogGrid = document.createElement('div');
            blogGrid.classList.add('blog-grid');
            
            if (filteredPosts.length > 0) {
                filteredPosts.forEach(post => {
                    const postElement = createBlogCardElement(post);
                    blogGrid.appendChild(postElement);
                });
            } else {
                const noPosts = document.createElement('p');
                noPosts.textContent = 'No posts found for this topic.';
                blogGrid.appendChild(noPosts);
            }

            mainContent.appendChild(heading);
            mainContent.appendChild(blogGrid);
        }

        // Renders the Topics page with pagination.
        function renderTopicsPage(pageNumber = 1) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            const allTopics = new Set();
            blogPosts.forEach(post => {
                post.topics.forEach(topic => allTopics.add(topic));
            });
            const uniqueTopics = Array.from(allTopics).sort();

            const topicsPerPage = 40;
            const startIndex = (pageNumber - 1) * topicsPerPage;
            const endIndex = startIndex + topicsPerPage;
            const topicsToDisplay = uniqueTopics.slice(startIndex, endIndex);

            const topicsGrid = document.createElement('div');
            topicsGrid.classList.add('topics-grid');
            
            topicsToDisplay.forEach(topic => {
                const topicButton = document.createElement('button');
                topicButton.classList.add('topic-button');
                topicButton.textContent = topic;
                topicButton.addEventListener('click', () => renderTopicPosts(topic));
                topicsGrid.appendChild(topicButton);
            });
            
            const pagination = document.createElement('div');
            pagination.classList.add('pagination');
            
            const prevButton = document.createElement('button');
            prevButton.textContent = 'Previous';
            prevButton.disabled = pageNumber === 1;
            prevButton.addEventListener('click', () => renderTopicsPage(pageNumber - 1));
            
            const nextButton = document.createElement('button');
            nextButton.textContent = 'Next';
            nextButton.disabled = endIndex >= uniqueTopics.length;
            nextButton.addEventListener('click', () => renderTopicsPage(pageNumber + 1));

            const pageInfo = document.createElement('span');
            pageInfo.textContent = `Page ${pageNumber}`;

            pagination.appendChild(prevButton);
            pagination.appendChild(pageInfo);
            pagination.appendChild(nextButton);

            mainContent.appendChild(topicsGrid);
            mainContent.appendChild(pagination);
        }

        // Renders the Random page with a single random post.
        async function renderRandomPage() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';
            
            if (blogPosts.length > 0) {
                const randomIndex = Math.floor(Math.random() * blogPosts.length);
                const randomPost = blogPosts[randomIndex];
                
                const postElement = await createFullPostElement(randomPost);
                
                const contentWrapper = document.createElement('div');
                contentWrapper.classList.add('content-section');
                contentWrapper.appendChild(postElement);
                
                mainContent.appendChild(contentWrapper);
            } else {
                mainContent.textContent = 'No blog posts available.';
            }

            const newButton = document.createElement('button');
            newButton.classList.add('random-post-button');
            newButton.textContent = 'Show Another Random Post';
            newButton.addEventListener('click', renderRandomPage);

            mainContent.appendChild(newButton);
        }

        // Renders a single post on its own page
        async function renderSinglePost(postId) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            const post = blogPosts.find(p => p.id == postId);
            if (post) {
                const postElement = await createFullPostElement(post);
                
                const contentWrapper = document.createElement('div');
                contentWrapper.classList.add('content-section');
                contentWrapper.appendChild(postElement);
                
                mainContent.appendChild(contentWrapper);
            } else {
                mainContent.textContent = 'Post not found.';
            }
        }
        
        // --- Search Functionality ---

        // List of common English words to ignore in search queries
        const stopWords = ['a', 'an', 'and', 'are', 'as', 'at', 'be', 'but', 'by', 'for', 'if', 'in', 'into', 'is', 'it', 'no', 'not', 'of', 'on', 'or', 'such', 'that', 'the', 'their', 'then', 'there', 'these', 'they', 'this', 'to', 'was', 'will', 'with', 'how', 'what', 'who'];

        // Sanitizes a string to prevent XSS attacks by creating a temporary element
        function sanitizeInput(str) {
            const tempDiv = document.createElement('div');
            tempDiv.textContent = str;
            return tempDiv.innerHTML;
        }

        // Processes a string for search by lowercasing, removing punctuation, and filtering out stop words.
        function processTextForSearch(text) {
            const lowercasedText = text.toLowerCase();
            const alphanumericText = lowercasedText.replace(/[^\w\s]/g, '');
            const words = alphanumericText.split(/\s+/);
            return words.filter(word => word.length > 0 && !stopWords.includes(word));
        }

        // Renders the search results based on title matches
        function renderSearchResults(query) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            // Sanitize and process the user's query
            const sanitizedQuery = sanitizeInput(query);
            const processedQueryWords = processTextForSearch(sanitizedQuery);

            const results = [];

            if (processedQueryWords.length > 0) {
                // Loop through all blog posts
                for (const post of blogPosts) {
                    const processedTitleWords = processTextForSearch(post.title);
                    let score = 0;

                    // Calculate a score for each post based on keyword matches in the title
                    processedQueryWords.forEach(queryWord => {
                        // Check if the title includes the query word
                        if (processedTitleWords.join(' ').includes(queryWord)) {
                            score += 1;
                        }
                    });

                    // Only include the post in the results if it has a positive score
                    if (score > 0) {
                        results.push({ post, score });
                    }
                }
            }

            // Sort results by the score (most relevant first)
            results.sort((a, b) => b.score - a.score);

            const heading = document.createElement('h2');
            heading.textContent = `Search Results for "${sanitizedQuery}"`;
            mainContent.appendChild(heading);

            const blogGrid = document.createElement('div');
            blogGrid.classList.add('blog-grid');

            if (results.length > 0) {
                results.forEach(result => {
                    const postElement = createBlogCardElement(result.post);
                    blogGrid.appendChild(postElement);
                });
            } else {
                const noResults = document.createElement('p');
                noResults.textContent = 'No posts found matching your search.';
                blogGrid.appendChild(noResults);
            }
            mainContent.appendChild(blogGrid);
        }

        // Handles the search event
        function handleSearch() {
            const searchInput = document.getElementById('search-input');
            const query = searchInput.value.trim();
            if (query) {
                renderSearchResults(query);
            }
        }

        // --- Event Listeners and Initial Load ---

        // Event listener for the mobile menu toggle
        const menuToggle = document.querySelector('.menu-toggle');
        const navContainer = document.querySelector('.nav-container');

        menuToggle.addEventListener('click', () => {
            navContainer.classList.toggle('active');
        });
        
        // Simple page routing based on data attributes
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (event) => {
                event.preventDefault(); // Prevent default link behavior
                const page = event.target.dataset.page;
                
                // Close mobile menu
                navContainer.classList.remove('active');

                // Route to the correct page based on the data attribute
                switch (page) {
                    case 'home':
                        renderHomePage();
                        break;
                    case 'blog':
                        renderBlogPage();
                        break;
                    case 'topics':
                        renderTopicsPage();
                        break;
                    case 'books': 
                        renderBooksPage(); // Start at page 1
                        break;
                    case 'random':
                        renderRandomPage();
                        break;
                    default:
                        renderHomePage(); // Default to home page
                }
            });
        });

        // Event listener for blog post clicks on the blog page
        document.getElementById('main-content').addEventListener('click', (event) => {
            const blogPostElement = event.target.closest('.blog-post');
            if (blogPostElement && blogPostElement.dataset.id) {
                renderSinglePost(blogPostElement.dataset.id);
            }
        });

        // Add event listeners for the search functionality
        document.getElementById('search-button').addEventListener('click', handleSearch);
        document.getElementById('search-input').addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                handleSearch();
            }
        });

        // Initial page load: fetch data and render the Home page
        document.addEventListener('DOMContentLoaded', () => {
            fetchBlogPosts();
        });
    </script>
</body>
</html>
